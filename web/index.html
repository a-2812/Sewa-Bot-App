<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SewaBot — Pakistan ka AI Service Orchestrator. Book trusted local service providers instantly.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SewaBot">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme color (Android Chrome top bar) -->
  <meta name="theme-color" content="#000000">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SewaBot</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent white flash before Flutter loads */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000000;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* Loading screen shown while Flutter initialises */
    #splash-loader {
      position: fixed;
      inset: 0;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #splash-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-icon {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .splash-name {
      margin-top: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 1.5px;
    }

    .splash-tagline {
      margin-top: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #666666;
      letter-spacing: 0.3px;
    }

    .splash-dots {
      display: flex;
      gap: 8px;
      margin-top: 32px;
    }

    .splash-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffffff;
      animation: dot-pulse 1.2s ease-in-out infinite;
    }

    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: 1;   }
      50%       { transform: scale(1.06); opacity: 0.85; }
    }

    @keyframes dot-pulse {
      0%, 100% { transform: scale(0.6); opacity: 0.3; }
      50%       { transform: scale(1.0); opacity: 1.0; }
    }
  </style>
</head>
<body>

  <!-- Native HTML splash — hidden once Flutter takes over -->
  <div id="splash-loader">
    <img class="splash-icon" src="icons/Icon-192.png" alt="SewaBot">
    <div class="splash-name">SewaBot</div>
    <div class="splash-tagline">Pakistan ka AI Service Orchestrator</div>
    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide the HTML splash once Flutter has rendered its first frame
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('splash-loader');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function () { loader.remove(); }, 500);
      }
    });
  </script>

</body>
</html>
