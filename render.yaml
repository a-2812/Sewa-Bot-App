services:
  # ── SewaBot Backend API (port 8000 → $PORT on Render) ────────────────────
  - type: web
    name: sewabot-backend
    runtime: python
    rootDir: Sewa-Bot-App-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false

  # ── SewaBot Agents API (port 8001 → $PORT on Render) ─────────────────────
  - type: web
    name: sewabot-agents
    runtime: python
    rootDir: Sewa-Bot-App-agents/agents
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main_api:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: BACKEND_BASE_URL
        value: https://sewabot-backend.onrender.com
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: TEST_MODE
        value: "false"
