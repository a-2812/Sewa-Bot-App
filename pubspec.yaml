publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  http: ^1.2.0
  provider: ^6.1.1
  timeline_tile: ^2.0.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0
  permission_handler: ^11.1.0
  avatar_glow: ^2.0.2
  lottie: ^3.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock/
    - assets/lottie/
